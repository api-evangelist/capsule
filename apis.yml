aid: capsule
url: >-
  https://raw.githubusercontent.com/api-evangelist/capsule/refs/heads/main/apis.yml
name: Capsule
description: >-
  Capsule is a CRM and project-management platform for small and
  mid-sized businesses that unifies contacts, sales pipelines, tasks,
  cases, and projects. The Capsule REST API exposes parties (contacts
  and companies), opportunities, projects, tasks, cases, entries,
  tracks, and settings such as tags, pipelines, milestones, stages, and
  custom fields, with REST Hooks webhooks for event-driven integration.
